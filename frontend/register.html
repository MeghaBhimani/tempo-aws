<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tempo — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:     #a78bfa;
      --amber:    #c4b5fd;
      --gold-dim: #7c3aed;
      --dark:     #0d0b12;
      --surface:  #13111a;
      --card:     #1a1726;
      --border:   #2d2640;
      --text:     #ede9f8;
      --muted:    #8878aa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }

    body::before {
      width: 520px;
      height: 520px;
      top: -120px;
      right: -120px;
      background: repeating-radial-gradient(
        circle at center,
        #1e1929 0px, #1e1929 8px,
        #130f1e 8px, #130f1e 16px
      );
      border: 3px solid var(--gold-dim);
      box-shadow: 0 0 60px rgba(124,58,237,0.15);
      animation: spin 18s linear infinite;
    }

    body::after {
      width: 380px;
      height: 380px;
      bottom: -100px;
      left: -100px;
      background: repeating-radial-gradient(
        circle at center,
        #1a1525 0px, #1a1525 8px,
        #100c1a 8px, #100c1a 16px
      );
      border: 3px solid var(--gold-dim);
      box-shadow: 0 0 50px rgba(124,58,237,0.10);
      animation: spin 24s linear infinite reverse;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,58,237,0.12);
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-dim), var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.06em;
    }

    .brand-tagline {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--gold-dim); }
    input::placeholder { color: #444; }

    .error-msg {
      display: none;
      background: rgba(220,60,60,0.12);
      border: 1px solid rgba(220,60,60,0.3);
      border-radius: 8px;
      color: #e07070;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 18px;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    .success-msg {
      display: none;
      background: rgba(60,180,80,0.12);
      border: 1px solid rgba(60,180,80,0.3);
      border-radius: 8px;
      color: #70d080;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 18px;
      text-align: center;
    }

    .success-msg.visible { display: block; }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--gold-dim), #9d6df5);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">
      <div class="brand-name">Tempo</div>
      <div class="brand-tagline">Create your account</div>
    </div>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="user_name">Username</label>
        <input type="text" id="user_name" name="user_name" placeholder="Your display name" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters" autocomplete="new-password" required />
      </div>

      <button type="submit" class="btn" id="submitBtn">Create Account</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    // ── Change this to your EC2 / ECS ALB / API Gateway URL ──
    const API_BASE =  "http://ec2-54-92-222-201.compute-1.amazonaws.com";

    const form       = document.getElementById("registerForm");
    const errorMsg   = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    const submitBtn  = document.getElementById("submitBtn");

    function showError(msg) {
      successMsg.classList.remove("visible");
      errorMsg.textContent = msg;
      errorMsg.classList.add("visible");
    }

    function showSuccess(msg) {
      errorMsg.classList.remove("visible");
      successMsg.textContent = msg;
      successMsg.classList.add("visible");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.remove("visible");
      successMsg.classList.remove("visible");

      const email     = document.getElementById("email").value.trim();
      const user_name = document.getElementById("user_name").value.trim();
      const password  = document.getElementById("password").value.trim();

      if (!email || !user_name || !password) {
        showError("All fields are required.");
        return;
      }

      if (password.length < 6) {
        showError("Password must be at least 6 characters.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account…";

      try {
        const res = await fetch(`${API_BASE}/api/register`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ email, user_name, password }),
        });

        const data = await res.json();

        if (res.ok) {
          showSuccess("Account created! Redirecting to sign in…");
          setTimeout(() => { window.location.href = "login.html"; }, 1500);
        } else {
          showError(data.error || "Registration failed. Please try again.");
        }
      } catch (err) {
        showError("Network error. Check your connection and try again.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
