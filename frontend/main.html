<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tempo — Discover Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:     #a78bfa;
      --amber:    #c4b5fd;
      --gold-dim: #7c3aed;
      --dark:     #0d0b12;
      --surface:  #13111a;
      --card:     #1a1726;
      --card2:    #1e1b2e;
      --border:   #2d2640;
      --text:     #ede9f8;
      --muted:    #8878aa;
      --sidebar-w: 260px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
    }

    /* ══════════════════ SIDEBAR ══════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
      position: fixed;
      top: 0;
      left: 0;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-dim), var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .brand-tagline {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .user-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 28px;
    }

    .user-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .user-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gold);
      word-break: break-all;
    }

    .nav-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .nav-btn {
      display: block;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 6px;
    }

    .nav-btn:hover { background: var(--card); border-color: var(--border); }
    .nav-btn.active { background: var(--card); border-color: var(--gold-dim); color: var(--gold); }

    .sidebar-footer {
      margin-top: auto;
    }

    .logout-btn {
      display: block;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      text-align: left;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .logout-btn:hover { color: #e07070; border-color: rgba(220,60,60,0.3); }

    /* ══════════════════ MAIN CONTENT ══════════════════ */
    .content {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 48px;
      max-width: 1100px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ══════════════════ SEARCH PANEL ══════════════════ */
    .search-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 36px;
    }

    .search-panel h2 {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .field-group label {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-group input {
      width: 100%;
      padding: 10px 14px;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-group input:focus { border-color: var(--gold-dim); }
    .field-group input::placeholder { color: #333; }

    .search-actions {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--gold-dim), #9d6df5);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-ghost {
      padding: 10px 18px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--text); }

    /* ══════════════════ RESULTS ══════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--text);
    }

    .result-count {
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
      margin-bottom: 48px;
    }

    .music-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }

    .music-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      border-color: var(--gold-dim);
    }

    .music-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #111;
    }

    .music-card-body {
      padding: 14px;
    }

    .music-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-artist {
      font-size: 0.78rem;
      color: var(--amber);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-meta {
      font-size: 0.73rem;
      color: var(--muted);
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub-btn {
      width: 100%;
      padding: 7px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      border: 1px solid;
    }

    .sub-btn.subscribe {
      background: rgba(124,58,237,0.14);
      border-color: var(--gold-dim);
      color: var(--amber);
    }

    .sub-btn.subscribe:hover { background: rgba(124,58,237,0.26); }

    .sub-btn.unsubscribe {
      background: rgba(220,60,60,0.1);
      border-color: rgba(220,60,60,0.3);
      color: #e07070;
    }

    .sub-btn.unsubscribe:hover { background: rgba(220,60,60,0.18); }

    /* ══════════════════ SUBSCRIPTIONS ══════════════════ */
    .subs-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 48px;
    }

    .subs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }

    /* ══════════════════ STATES ══════════════════ */
    .empty-state, .loading-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty-state-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .error-banner {
      background: rgba(220,60,60,0.1);
      border: 1px solid rgba(220,60,60,0.25);
      border-radius: 8px;
      color: #e07070;
      padding: 10px 16px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      display: none;
    }

    .error-banner.visible { display: block; }

    /* placeholder artwork */
    .artwork-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, #1e1b2e, #130f1e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #333;
    }
  </style>
</head>
<body>

  <!-- ════════ SIDEBAR ════════ -->
  <aside class="sidebar">
    <div class="brand-name">Tempo</div>
    <div class="brand-tagline">Your music universe</div>

    <div class="user-info">
      <div class="user-label">Signed in as</div>
      <div class="user-name" id="sidebarUser">—</div>
    </div>

    <div class="nav-label">Navigation</div>
    <button class="nav-btn active" onclick="showSection('search')">🔍 Search Music</button>
    <button class="nav-btn"        onclick="showSection('subs')">♥ My Subscriptions</button>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">← Sign out</button>
    </div>
  </aside>

  <!-- ════════ CONTENT ════════ -->
  <main class="content">

    <!-- SEARCH SECTION -->
    <section id="searchSection">
      <div class="page-title">Discover Music</div>
      <div class="page-subtitle">Search by title, artist, year or album — at least one field required</div>

      <div class="search-panel">
        <h2>Search Filters</h2>
        <div class="error-banner" id="searchError"></div>
        <div class="search-grid">
          <div class="field-group">
            <label for="fTitle">Title</label>
            <input type="text" id="fTitle" placeholder="e.g. Blinding Lights" />
          </div>
          <div class="field-group">
            <label for="fArtist">Artist</label>
            <input type="text" id="fArtist" placeholder="e.g. Taylor Swift" />
          </div>
          <div class="field-group">
            <label for="fYear">Year</label>
            <input type="number" id="fYear" placeholder="e.g. 2020" min="1900" max="2099" />
          </div>
          <div class="field-group">
            <label for="fAlbum">Album</label>
            <input type="text" id="fAlbum" placeholder="e.g. Folklore" />
          </div>
        </div>
        <div class="search-actions">
          <button class="btn-primary" id="searchBtn" onclick="doSearch()">Search</button>
          <button class="btn-ghost" onclick="clearSearch()">Clear</button>
        </div>
      </div>

      <div id="resultsSection" style="display:none;">
        <div class="section-header">
          <span class="section-title">Results</span>
          <span class="result-count" id="resultCount">0 songs</span>
        </div>
        <div class="results-grid" id="resultsGrid"></div>
      </div>
    </section>

    <!-- SUBSCRIPTIONS SECTION -->
    <section id="subsSection" style="display:none;">
      <div class="page-title">My Subscriptions</div>
      <div class="page-subtitle">Songs you're following</div>

      <div class="subs-panel">
        <div class="section-header">
          <span class="section-title">Subscribed Songs</span>
          <span class="result-count" id="subsCount">—</span>
        </div>
        <div id="subsContent">
          <div class="loading-state">Loading…</div>
        </div>
      </div>
    </section>

  </main>

  <script>
    // ── Change this to your EC2 / ECS ALB / API Gateway URL ──
    const API_BASE =  "http://ec2-54-92-222-201.compute-1.amazonaws.com";

    // ── Auth guard ────────────────────────────────────────────
    let currentEmail    = sessionStorage.getItem("email");
    let currentUserName = sessionStorage.getItem("user_name");

    (async () => {
      // Verify session with server
      try {
        const r = await fetch(`${API_BASE}/api/me`, { credentials: "include" });
        if (!r.ok) {
          window.location.href = "login.html";
          return;
        }
        const me = await r.json();
        currentEmail    = me.email;
        currentUserName = me.user_name;
        sessionStorage.setItem("email",     currentEmail);
        sessionStorage.setItem("user_name", currentUserName);
      } catch (_) {
        // Network issue — rely on sessionStorage
        if (!currentEmail) {
          window.location.href = "login.html";
          return;
        }
      }
      document.getElementById("sidebarUser").textContent = currentUserName || currentEmail;
    })();

    // ── Subscriptions set (for subscribe button state) ────────
    let subscribedKeys = new Set();

    async function loadSubscriptionKeys() {
      try {
        const r = await fetch(`${API_BASE}/api/subscriptions`, { credentials: "include" });
        if (!r.ok) return;
        const data = await r.json();
        subscribedKeys = new Set((data.items || []).map(i => `${i.title}#${i.album}`));
      } catch (_) {}
    }

    // ── Navigation ────────────────────────────────────────────
    function showSection(name) {
      document.getElementById("searchSection").style.display = name === "search" ? "" : "none";
      document.getElementById("subsSection").style.display   = name === "subs"   ? "" : "none";
      document.querySelectorAll(".nav-btn").forEach((b, i) => {
        b.classList.toggle("active", (i === 0 && name === "search") || (i === 1 && name === "subs"));
      });
      if (name === "subs") loadSubscriptions();
    }

    // ── Logout ────────────────────────────────────────────────
    async function logout() {
      try {
        await fetch(`${API_BASE}/api/logout`, { method: "POST", credentials: "include" });
      } catch (_) {}
      sessionStorage.clear();
      window.location.href = "login.html";
    }

    // ── Search ────────────────────────────────────────────────
    async function doSearch() {
      const title  = document.getElementById("fTitle").value.trim();
      const artist = document.getElementById("fArtist").value.trim();
      const year   = document.getElementById("fYear").value.trim();
      const album  = document.getElementById("fAlbum").value.trim();

      const errorEl = document.getElementById("searchError");
      errorEl.classList.remove("visible");

      if (!title && !artist && !year && !album) {
        errorEl.textContent = "Please fill in at least one search field.";
        errorEl.classList.add("visible");
        return;
      }

      const btn = document.getElementById("searchBtn");
      btn.disabled = true;
      btn.textContent = "Searching…";

      await loadSubscriptionKeys();

      try {
        const params = new URLSearchParams();
        if (title)  params.set("title",  title);
        if (artist) params.set("artist", artist);
        if (year)   params.set("year",   year);
        if (album)  params.set("album",  album);

        const r = await fetch(`${API_BASE}/api/query?${params}`, { credentials: "include" });

        if (r.status === 401) { window.location.href = "login.html"; return; }

        const data = await r.json();

        if (!r.ok) {
          errorEl.textContent = data.error || "Search failed. Try again.";
          errorEl.classList.add("visible");
          return;
        }

        renderResults(data.items || []);

      } catch (err) {
        errorEl.textContent = "Network error. Check your connection.";
        errorEl.classList.add("visible");
      } finally {
        btn.disabled = false;
        btn.textContent = "Search";
      }
    }

    function clearSearch() {
      ["fTitle","fArtist","fYear","fAlbum"].forEach(id => { document.getElementById(id).value = ""; });
      document.getElementById("resultsSection").style.display = "none";
      document.getElementById("searchError").classList.remove("visible");
    }

    // Allow Enter key in search fields
    ["fTitle","fArtist","fYear","fAlbum"].forEach(id => {
      document.addEventListener("DOMContentLoaded", () => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });
      });
    });

    function renderResults(items) {
      const section = document.getElementById("resultsSection");
      const grid    = document.getElementById("resultsGrid");
      const count   = document.getElementById("resultCount");

      section.style.display = "";
      count.textContent = `${items.length} song${items.length !== 1 ? "s" : ""}`;

      if (items.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">🎵</div>
            No songs matched your search. Try different filters.
          </div>`;
        return;
      }

      grid.innerHTML = items.map(item => musicCardHTML(item, false)).join("");
    }

    // ── Subscriptions ─────────────────────────────────────────
    async function loadSubscriptions() {
      const content  = document.getElementById("subsContent");
      const countEl  = document.getElementById("subsCount");
      content.innerHTML = `<div class="loading-state">Loading your subscriptions…</div>`;

      try {
        const r = await fetch(`${API_BASE}/api/subscriptions`, { credentials: "include" });
        if (r.status === 401) { window.location.href = "login.html"; return; }
        const data = await r.json();
        const items = data.items || [];

        subscribedKeys = new Set(items.map(i => `${i.title}#${i.album}`));
        countEl.textContent = `${items.length} song${items.length !== 1 ? "s" : ""}`;

        if (items.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">♥</div>
              You haven't subscribed to any songs yet.<br>Search for music and hit Subscribe.
            </div>`;
          return;
        }

        content.innerHTML = `<div class="subs-grid">${items.map(i => musicCardHTML(i, true)).join("")}</div>`;

      } catch (err) {
        content.innerHTML = `<div class="empty-state">Failed to load subscriptions. Try again.</div>`;
      }
    }

    // ── Card HTML ─────────────────────────────────────────────
    function musicCardHTML(item, inSubsView) {
      const key         = `${item.title}#${item.album}`;
      const isSubbed    = inSubsView || subscribedKeys.has(key);
      const safeTitle   = escHtml(item.title  || "Unknown Title");
      const safeArtist  = escHtml(item.artist || "Unknown Artist");
      const safeAlbum   = escHtml(item.album  || "");
      const safeYear    = escHtml(String(item.year || ""));
      const imgUrl      = item.image_url || item.img_url || "";
      const dataJson    = escAttr(JSON.stringify({
        title:     item.title  || "",
        artist:    item.artist || "",
        album:     item.album  || "",
        year:      item.year   || "",
        image_url: imgUrl,
      }));

      const artwork = imgUrl
        ? `<img src="${escAttr(imgUrl)}" alt="${safeTitle}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=artwork-placeholder>♪</div>'">`
        : `<div class="artwork-placeholder">♪</div>`;

      const btnLabel = isSubbed ? "✓ Unsubscribe" : "+ Subscribe";
      const btnClass = isSubbed ? "sub-btn unsubscribe" : "sub-btn subscribe";
      const btnFn    = isSubbed ? `removeSub(this,'${escAttr(item.title||"")}','${escAttr(item.album||"")}')` : `addSub(this,'${dataJson}')`;

      return `
        <div class="music-card">
          ${artwork}
          <div class="music-card-body">
            <div class="music-title"  title="${safeTitle}">${safeTitle}</div>
            <div class="music-artist" title="${safeArtist}">${safeArtist}</div>
            <div class="music-meta">${[safeAlbum, safeYear].filter(Boolean).join(" · ")}</div>
            <button class="${btnClass}" onclick="${btnFn}">${btnLabel}</button>
          </div>
        </div>`;
    }

    // ── Subscribe ─────────────────────────────────────────────
    async function addSub(btn, jsonStr) {
      const item = JSON.parse(jsonStr);
      btn.disabled = true;
      btn.textContent = "…";

      try {
        const r = await fetch(`${API_BASE}/api/subscribe`, {
          method:      "POST",
          credentials: "include",
          headers:     { "Content-Type": "application/json" },
          body:        JSON.stringify(item),
        });

        if (r.status === 401) { window.location.href = "login.html"; return; }

        if (r.ok) {
          subscribedKeys.add(`${item.title}#${item.album}`);
          btn.textContent = "✓ Unsubscribe";
          btn.className   = "sub-btn unsubscribe";
          const dataJson  = escAttr(JSON.stringify(item));
          btn.setAttribute("onclick", `removeSub(this,'${escAttr(item.title)}','${escAttr(item.album)}')`);
        } else {
          btn.textContent = "Error";
          setTimeout(() => { btn.disabled = false; btn.textContent = "+ Subscribe"; }, 2000);
        }
      } catch (_) {
        btn.textContent = "Error";
        setTimeout(() => { btn.disabled = false; btn.textContent = "+ Subscribe"; }, 2000);
      }
    }

    // ── Unsubscribe ───────────────────────────────────────────
    async function removeSub(btn, title, album) {
      btn.disabled = true;
      btn.textContent = "…";

      try {
        const r = await fetch(`${API_BASE}/api/unsubscribe`, {
          method:      "DELETE",
          credentials: "include",
          headers:     { "Content-Type": "application/json" },
          body:        JSON.stringify({ title, album }),
        });

        if (r.status === 401) { window.location.href = "login.html"; return; }

        if (r.ok) {
          subscribedKeys.delete(`${title}#${album}`);
          // If we're in the subs panel, remove the card
          const subsSection = document.getElementById("subsSection");
          if (subsSection.style.display !== "none") {
            const card = btn.closest(".music-card");
            if (card) {
              card.style.opacity = "0";
              card.style.transition = "opacity 0.3s";
              setTimeout(() => { card.remove(); refreshSubsCount(); }, 300);
            }
          } else {
            btn.textContent = "+ Subscribe";
            btn.className   = "sub-btn subscribe";
            const escaped = escAttr(JSON.stringify({ title, album }));
            btn.setAttribute("onclick", `addSub(this,'${escaped}')`);
            btn.disabled = false;
          }
        } else {
          btn.disabled = false;
          btn.textContent = "✓ Unsubscribe";
        }
      } catch (_) {
        btn.disabled = false;
        btn.textContent = "✓ Unsubscribe";
      }
    }

    function refreshSubsCount() {
      const cards = document.querySelectorAll("#subsContent .music-card");
      const countEl = document.getElementById("subsCount");
      countEl.textContent = `${cards.length} song${cards.length !== 1 ? "s" : ""}`;
      if (cards.length === 0) {
        document.getElementById("subsContent").innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">♥</div>
            You have no subscriptions. Search for music to add some!
          </div>`;
      }
    }

    // ── Utilities ─────────────────────────────────────────────
    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function escAttr(str) {
      return String(str).replace(/'/g,"&#39;").replace(/"/g,"&quot;");
    }

    // Load subscription keys on page ready
    loadSubscriptionKeys();
  </script>
</body>
</html>
