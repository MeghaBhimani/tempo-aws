<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tempo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --surface:   rgba(255,255,255,0.04);
      --surface2:  rgba(255,255,255,0.07);
      --surface3:  rgba(255,255,255,0.03);
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(139,92,246,0.45);
      --primary:   #8b5cf6;
      --primary-2: #ec4899;
      --accent:    #06b6d4;
      --text:      #f1f0ff;
      --text-2:    #a5a3b5;
      --muted:     #6b7280;
      --error:     #f87171;
      --success:   #34d399;
      --radius:    12px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 400; }

    /* Fixed bg gradient */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 0%, rgba(124,58,237,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 10% 100%, rgba(236,72,153,0.08) 0%, transparent 70%);
    }

    /* ── Navbar ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 2rem;
      background: rgba(7,7,15,0.8); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 0.65rem; }
    .nav-logo {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      box-shadow: 0 0 16px rgba(139,92,246,0.4);
      flex-shrink: 0;
    }
    .nav-brand h1 {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #c4b5fd 0%, #f9a8d4 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-right { display: flex; align-items: center; gap: 1.2rem; }
    .nav-user { font-size: 0.82rem; color: var(--muted); }
    .nav-user span { color: #c4b5fd; font-weight: 600; }
    .btn-logout {
      padding: 0.4rem 0.9rem; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--muted); font-family: 'Inter', sans-serif;
      font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
      text-decoration: none; letter-spacing: 0.02em;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); background: rgba(248,113,113,0.06); }

    /* ── Layout ── */
    .main-grid {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1.25rem;
      padding: 1.25rem 2rem;
      min-height: calc(100vh - 61px);
    }

    /* ── Panel ── */
    .panel {
      background: rgba(13,12,24,0.7);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .panel-header {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .panel-icon {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 9px;
      background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.2);
      flex-shrink: 0;
    }
    .panel-icon svg { width: 15px; height: 15px; stroke: #a78bfa; fill: none; stroke-width: 2; }
    .panel-title { font-size: 0.95rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
    .panel-count {
      margin-left: auto;
      font-size: 0.72rem; font-weight: 600; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 0.15rem 0.55rem; border-radius: 99px;
    }

    /* ── Song Cards ── */
    .song-card {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.8rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 0.6rem;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      cursor: default;
    }
    .song-card:hover { border-color: rgba(139,92,246,0.3); background: var(--surface2); transform: translateX(2px); }

    .song-art {
      width: 50px; height: 50px; border-radius: 10px;
      object-fit: cover; background: var(--surface2);
      flex-shrink: 0; border: 1px solid var(--border);
    }
    .song-art-placeholder {
      width: 50px; height: 50px; border-radius: 10px;
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(236,72,153,0.2));
      border: 1px solid rgba(139,92,246,0.2);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .song-art-placeholder svg { width: 18px; height: 18px; stroke: #a78bfa; fill: none; stroke-width: 1.8; opacity: 0.6; }

    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 0.87rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-meta { font-size: 0.73rem; color: var(--muted); margin-top: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-year { display: inline-block; background: rgba(139,92,246,0.12); color: #a78bfa; font-size: 0.66rem; font-weight: 600; padding: 0.1rem 0.4rem; border-radius: 4px; margin-left: 0.35rem; }

    /* ── Buttons ── */
    .btn-action {
      padding: 0.38rem 0.8rem; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 0.73rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap; border: none;
      letter-spacing: 0.02em;
    }
    .btn-action:active { transform: scale(0.95); }

    .btn-subscribe {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      box-shadow: 0 2px 12px rgba(124,58,237,0.3);
    }
    .btn-subscribe:hover { box-shadow: 0 3px 16px rgba(124,58,237,0.5); opacity: 0.9; }

    .btn-subscribed {
      background: rgba(52,211,153,0.1); color: var(--success);
      border: 1px solid rgba(52,211,153,0.25) !important;
      cursor: default !important;
    }

    .btn-remove {
      background: rgba(248,113,113,0.1); color: var(--error);
      border: 1px solid rgba(248,113,113,0.25) !important;
    }
    .btn-remove:hover { background: rgba(248,113,113,0.2); }

    /* ── Search Form ── */
    .search-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-bottom: 1rem;
    }
    .input-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .input-group label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .search-input {
      padding: 0.7rem 0.9rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.86rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: #374151; }
    .search-input:focus { border-color: var(--border-hi); box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }

    .btn-search {
      grid-column: 1 / -1;
      padding: 0.8rem; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
      color: #fff; font-family: 'Inter', sans-serif; font-size: 0.85rem;
      font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 3px 16px rgba(124,58,237,0.35);
      position: relative; overflow: hidden;
    }
    .btn-search::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
      pointer-events: none;
    }
    .btn-search:hover { opacity: 0.9; box-shadow: 0 5px 24px rgba(124,58,237,0.5); transform: translateY(-1px); }
    .btn-search:active { transform: scale(0.98); }

    /* ── States ── */
    .empty-state {
      text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.84rem;
    }
    .empty-state-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border-radius: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .empty-state-icon svg { width: 22px; height: 22px; stroke: var(--muted); fill: none; stroke-width: 1.6; }
    .empty-state p { line-height: 1.6; }

    .alert-error {
      display: flex; align-items: center; gap: 0.5rem;
      color: var(--error); font-size: 0.82rem; font-weight: 500;
      padding: 0.7rem 0.9rem;
      background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.18); border-radius: 10px;
    }

    /* ── Results ── */
    .results-area { margin-top: 1rem; max-height: 58vh; overflow-y: auto; padding-right: 2px; }
    .results-area::-webkit-scrollbar { width: 3px; }
    .results-area::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 3px; }

    #sub-list { max-height: 72vh; overflow-y: auto; padding-right: 2px; }
    #sub-list::-webkit-scrollbar { width: 3px; }
    #sub-list::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 3px; }

    /* ── Divider ── */
    .section-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 1rem 0;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <div class="nav-brand">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <h1>Lyra</h1>
  </div>
  <div class="nav-right">
    <p class="nav-user">Hey, <span>{{ user_name }}</span></p>
    <a href="/logout" class="btn-logout">Sign out</a>
  </div>
</nav>

<!-- Main grid -->
<div class="main-grid">

  <!-- LEFT: Subscriptions -->
  <section class="panel">
    <div class="panel-header">
      <div class="panel-icon">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <span class="panel-title">My Library</span>
      <span class="panel-count" id="sub-count">0 tracks</span>
    </div>

    <div id="sub-list">
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <p>Your library is empty.<br/>Search and subscribe to songs.</p>
      </div>
    </div>
  </section>

  <!-- RIGHT: Search -->
  <section class="panel">
    <div class="panel-header">
      <div class="panel-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <span class="panel-title">Discover Music</span>
    </div>

    <div class="search-grid">
      <div class="input-group">
        <label>Title</label>
        <input id="q-title" class="search-input" placeholder="e.g. Bohemian Rhapsody" />
      </div>
      <div class="input-group">
        <label>Artist</label>
        <input id="q-artist" class="search-input" placeholder="e.g. Queen" />
      </div>
      <div class="input-group">
        <label>Year</label>
        <input id="q-year" class="search-input" placeholder="e.g. 1975" />
      </div>
      <div class="input-group">
        <label>Album</label>
        <input id="q-album" class="search-input" placeholder="e.g. A Night at the Opera" />
      </div>
      <button class="btn-search" onclick="queryMusic()">
        Search
      </button>
    </div>

    <div id="query-results"></div>
  </section>

</div>

<script>
  const EMAIL = "{{ email }}";
  const songStore = {};
  const subscribedKeys = new Set();

  function updateSubCount(n) {
    document.getElementById('sub-count').textContent = n + (n === 1 ? ' track' : ' tracks');
  }

  async function loadSubscriptions() {
    const list = document.getElementById('sub-list');
    list.innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
    try {
      const res  = await fetch('/api/subscriptions');
      const data = await res.json();
      subscribedKeys.clear();
      if (!data.items || data.items.length === 0) {
        updateSubCount(0);
        list.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
          <p>Your library is empty.<br/>Search and subscribe to songs.</p>
        </div>`;
      } else {
        data.items.forEach(s => {
          const key = `${s.title}||${s.artist}`;
          subscribedKeys.add(key);
          songStore[key] = s;
        });
        updateSubCount(data.items.length);
        list.innerHTML = data.items.map(s => songCard(s, 'remove')).join('');
      }
    } catch(e) {
      list.innerHTML = '<div class="empty-state"><p>Could not load subscriptions.</p></div>';
    }
  }

  async function queryMusic() {
    const title   = document.getElementById('q-title').value.trim();
    const artist  = document.getElementById('q-artist').value.trim();
    const year    = document.getElementById('q-year').value.trim();
    const album   = document.getElementById('q-album').value.trim();
    const results = document.getElementById('query-results');

    if (!title && !artist && !year && !album) {
      results.innerHTML = '<div class="alert-error"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Fill in at least one field.</div>';
      return;
    }

    results.innerHTML = '<div class="empty-state"><p>Searching…</p></div>';
    const params = new URLSearchParams();
    if (title)  params.append('title', title);
    if (artist) params.append('artist', artist);
    if (year)   params.append('year', year);
    if (album)  params.append('album', album);

    try {
      const res  = await fetch(`/api/query?${params}`);
      const data = await res.json();
      if (!data.items || data.items.length === 0) {
        results.innerHTML = '<div class="alert-error"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>No results found. Try different search terms.</div>';
      } else {
        results.innerHTML = '<div class="results-area">' + data.items.map(s => songCard(s, 'subscribe')).join('') + '</div>';
      }
    } catch(e) {
      results.innerHTML = '<div class="alert-error"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Query failed. Check your connection.</div>';
    }
  }

  async function subscribe(key, btn) {
    const s = songStore[key];
    if (!s) return;
    btn.disabled = true;
    btn.textContent = '…';
    const res = await fetch('/api/subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ title: s.title, artist: s.artist, year: s.year || '', album: s.album || '', image_url: s.image_url || '' })
    });
    if (res.ok) {
      btn.className = 'btn-action btn-subscribed';
      btn.textContent = '✓ Saved';
      subscribedKeys.add(key);
      loadSubscriptions();
    } else {
      btn.disabled = false;
      btn.textContent = 'Subscribe';
    }
  }

  async function unsubscribe(key, btn) {
    const s = songStore[key];
    if (!s) return;
    btn.disabled = true;
    const res = await fetch('/api/unsubscribe', {
      method: 'DELETE',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({title: s.title, album: s.album || ''})
    });
    if (res.ok) { subscribedKeys.delete(key); loadSubscriptions(); }
    else { btn.disabled = false; }
  }

  function songCard(s, action) {
    const key = `${s.title}||${s.artist}`;
    songStore[key] = s;
    const safeKey = esc(key);
    let btn;
    if (action === 'subscribe') {
      if (subscribedKeys.has(key)) {
        btn = `<button class="btn-action btn-subscribed" disabled>✓ Saved</button>`;
      } else {
        btn = `<button class="btn-action btn-subscribe" onclick="subscribe('${safeKey}', this)">Subscribe</button>`;
      }
    } else {
      btn = `<button class="btn-action btn-remove" onclick="unsubscribe('${safeKey}', this)">Remove</button>`;
    }

    const imgSrc = s.image_url || '';
    const artHtml = imgSrc
      ? `<img class="song-art" src="${esc(imgSrc)}" alt="${esc(s.artist)}" onerror="this.outerHTML='<div class=\\'song-art-placeholder\\'><svg viewBox=\\'0 0 24 24\\'><path d=\\'M9 18V5l12-2v13\\'/><circle cx=\\'6\\' cy=\\'18\\' r=\\'3\\'/><circle cx=\\'18\\' cy=\\'16\\' r=\\'3\\'/></svg></div>'" />`
      : `<div class="song-art-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`;

    const yearBadge = s.year ? `<span class="song-year">${esc(String(s.year))}</span>` : '';
    const albumText = s.album ? `${esc(s.album)} ` : '';

    return `
      <div class="song-card">
        ${artHtml}
        <div class="song-info">
          <div class="song-title">${esc(s.title)}</div>
          <div class="song-meta">${esc(s.artist)} &middot; ${albumText}${yearBadge}</div>
        </div>
        ${btn}
      </div>`;
  }

  function esc(str) {
    return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  window.onload = loadSubscriptions;
</script>
</body>
</html>
