<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tempo — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --surface:   rgba(255,255,255,0.04);
      --surface2:  rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(139,92,246,0.5);
      --primary:   #8b5cf6;
      --primary-2: #ec4899;
      --accent:    #06b6d4;
      --text:      #f1f0ff;
      --muted:     #6b7280;
      --error:     #f87171;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      overflow: hidden;
    }

    /* Animated gradient orbs */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float linear infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      top: -150px; right: -100px;
      animation-duration: 20s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #ec4899 0%, transparent 70%);
      bottom: -150px; left: -100px;
      animation-duration: 25s;
      animation-direction: reverse;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
      top: 40%; left: 30%;
      opacity: 0.15;
      animation-duration: 30s;
    }
    @keyframes float {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -30px) scale(1.05); }
      66%  { transform: translate(-20px, 20px) scale(0.95); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* Noise overlay */
    .bg-orbs::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    .page {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(15,14,30,0.75);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.8rem 2.4rem;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(139,92,246,0.08),
        0 32px 64px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 2.2rem;
    }
    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      margin-bottom: 1.1rem;
      box-shadow: 0 0 32px rgba(139,92,246,0.4), 0 0 64px rgba(236,72,153,0.2);
      animation: pulse-glow 3s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 32px rgba(139,92,246,0.4), 0 0 64px rgba(236,72,153,0.2); }
      50%       { box-shadow: 0 0 48px rgba(139,92,246,0.6), 0 0 80px rgba(236,72,153,0.3); }
    }
    .brand h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #c4b5fd 0%, #f9a8d4 60%, #a5f3fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .brand p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Error */
    .error-msg {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      color: var(--error);
      font-size: 0.82rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.2rem;
      font-weight: 500;
    }
    .error-msg.visible {
      display: flex;
      animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-3px); }
      80%     { transform: translateX(3px); }
    }

    /* Form */
    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.71rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
      font-weight: 600;
    }

    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      stroke: var(--muted); fill: none;
      stroke-width: 2; pointer-events: none;
      transition: stroke 0.2s;
    }

    input {
      width: 100%;
      padding: 0.82rem 1rem 0.82rem 2.7rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder { color: #374151; }
    input:focus {
      border-color: var(--border-hi);
      background: rgba(139,92,246,0.06);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
    }
    .input-wrap:focus-within svg { stroke: var(--primary); }

    /* Button */
    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      margin-top: 0.6rem;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4), 0 2px 8px rgba(219,39,119,0.3);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-primary:hover {
      opacity: 0.9;
      box-shadow: 0 6px 28px rgba(124,58,237,0.55), 0 3px 12px rgba(219,39,119,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: scale(0.98) translateY(0); }

    /* Footer */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.8rem 0 1.4rem;
    }
    .footer-link {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .footer-link a {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .footer-link a:hover { color: #c4b5fd; }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <h1>Lyra</h1>
      <p>Your Music Universe</p>
    </div>

    <div class="error-msg {% if error %}visible{% endif %}" role="alert">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>{{ error }}</span>
    </div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          <input type="email" id="email" name="email" placeholder="you@student.rmit.edu.au" autocomplete="email" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <hr class="divider"/>
    <p class="footer-link">Don't have an account? <a href="/register">Create one</a></p>

  </div>
</div>

</body>
</html>
